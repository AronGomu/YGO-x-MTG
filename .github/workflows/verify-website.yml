name: Verify website

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          config-file: ./.github/dependency-review-config.yml

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - run: python -m pip install --require-hashes -r requirements-dev.lock
      - run: python -m unittest discover -s tests
      - run: python .script/audit_python_dependencies.py
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - working-directory: website
        run: npm ci --ignore-scripts
      - name: Rebuild reviewed native tools only
        working-directory: website
        run: npm rebuild esbuild sharp
      - working-directory: website
        run: npm run audit:deps
      - working-directory: website
        run: npx playwright install --with-deps chromium firefox webkit
      - working-directory: website
        run: npm run format:check && npm run lint && npm run check && npm run test
      - name: Protect published snapshot lineage
        working-directory: website
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: npm run snapshots:check
      - name: Build repository-base artifact
        working-directory: website
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /YGO-x-MTG/
          OUT_DIR: dist-pages
        run: npm run build && npm run links:check
      - name: Build root-base artifact
        working-directory: website
        env:
          SITE_URL: https://example.invalid
          BASE_PATH: /
          OUT_DIR: dist-root
        run: npm run build && npm run links:check
      - name: Browser matrix against root-base preview
        working-directory: website
        env:
          OUT_DIR: dist-root
        run: npm run test:e2e
      - name: Repository-base browser smoke
        working-directory: website
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /YGO-x-MTG/
          E2E_BASE_PATH: /YGO-x-MTG/
          OUT_DIR: dist-pages
        run: npx playwright test tests/e2e/smoke.spec.ts --project=chromium
      - name: Final public artifact scan
        working-directory: website
        env:
          BASE_PATH: /YGO-x-MTG/
          OUT_DIR: dist-pages
        run: npm run links:check && node scripts/scan-dist.mjs && npm run budgets:check
      - name: Gate public artifact rights
        working-directory: website
        run: npm run rights:check
      - name: Bind artifact to source SHA
        shell: bash
        run: |
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -cf website-pages.tar -C website/dist-pages .
          sha256sum website-pages.tar | tee website-pages.sha256
          printf '%s\n' '${{ github.sha }}' > website-pages.source-sha
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: website-pages-${{ github.sha }}
          path: |
            website-pages.tar
            website-pages.sha256
            website-pages.source-sha
          if-no-files-found: error
          retention-days: 30
